<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Smart Stock Analyzer | NSE Insights</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{width:30px;height:30px;background:#1d9e75;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.header h1{font-size:17px;font-weight:600}
.nav-tabs{display:flex;gap:4px;margin-left:auto}
.nav-tab{background:transparent;border:1px solid #30363d;border-radius:6px;padding:5px 14px;font-size:12px;color:#7d8590;cursor:pointer;transition:all 0.2s;font-family:inherit}
.nav-tab.active,.nav-tab:hover{background:#21262d;color:#e6edf3;border-color:#484f58}
.container{max-width:1100px;margin:0 auto;padding:20px}
.search-bar{display:flex;gap:10px;margin-bottom:20px}
.search-bar input{flex:1;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:11px 14px;color:#e6edf3;font-size:14px;outline:none;transition:border-color 0.2s;font-family:inherit}
.search-bar input:focus{border-color:#1d9e75}
.search-bar input::placeholder{color:#7d8590}
.btn{background:#1d9e75;border:none;border-radius:8px;padding:11px 22px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;white-space:nowrap;font-family:inherit}
.btn:hover{background:#0f6e56}
.btn:disabled{background:#21262d;color:#7d8590;cursor:not-allowed}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.chip{background:#21262d;border:1px solid #30363d;border-radius:20px;padding:4px 12px;font-size:12px;color:#7d8590;cursor:pointer;transition:all 0.2s}
.chip:hover{border-color:#1d9e75;color:#1d9e75}
.page{display:none}.page.active{display:block}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.metric-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:13px 15px}
.metric-label{font-size:10px;color:#7d8590;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.metric-value{font-size:19px;font-weight:600}
.metric-sub{font-size:11px;margin-top:3px}
.up{color:#3fb950}.down{color:#f85149}.neutral{color:#7d8590}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px}
.card h3{font-size:13px;font-weight:600;color:#e6edf3;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-buy{background:rgba(63,185,80,0.15);color:#3fb950}
.badge-sell{background:rgba(248,81,73,0.15);color:#f85149}
.badge-hold{background:rgba(210,153,34,0.15);color:#d2991a}
.ind-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #21262d}
.ind-row:last-child{border:none}
.ind-name{font-size:12px;color:#7d8590}
.ind-val{font-size:12px;font-weight:500}
.chart-wrap{position:relative;height:190px;margin-top:8px}
.ai-box{background:#161b22;border:1px solid #30363d;border-left:3px solid #1d9e75;border-radius:10px;padding:16px;margin-bottom:18px}
.ai-box h3{font-size:13px;font-weight:600;color:#1d9e75;margin-bottom:8px}
.ai-box p{font-size:13px;color:#c9d1d9;line-height:1.7}
.verdict{display:inline-block;font-size:16px;font-weight:700;padding:5px 16px;border-radius:8px;margin-top:8px}
.verdict-buy{background:rgba(63,185,80,0.15);color:#3fb950;border:1px solid rgba(63,185,80,0.3)}
.verdict-sell{background:rgba(248,81,73,0.15);color:#f85149;border:1px solid rgba(248,81,73,0.3)}
.verdict-hold{background:rgba(210,153,34,0.15);color:#d2991a;border:1px solid rgba(210,153,34,0.3)}
.bt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.bt-card{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:11px;text-align:center}
.bt-val{font-size:17px;font-weight:600}
.bt-lbl{font-size:10px;color:#7d8590;margin-top:3px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;gap:14px}
.spinner{width:34px;height:34px;border:3px solid #30363d;border-top-color:#1d9e75;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#7d8590;font-size:13px}
.err-box{background:rgba(248,81,73,0.1);border:1px solid rgba(248,81,73,0.3);border-radius:10px;padding:14px;color:#f85149;font-size:13px;margin-bottom:18px}
.prog-bar{height:5px;background:#21262d;border-radius:3px;overflow:hidden;margin-top:5px}
.prog-fill{height:100%;border-radius:3px}
.disclaimer{font-size:10px;color:#7d8590;text-align:center;margin-top:20px;padding-top:12px;border-top:1px solid #21262d}
.pt-hero{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin-bottom:18px;text-align:center}
.pt-current{font-size:13px;color:#7d8590;margin-bottom:4px}
.pt-price{font-size:34px;font-weight:700;color:#e6edf3;margin-bottom:4px}
.pt-horizon{font-size:12px;color:#7d8590}
.scenarios{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
.scenario-card{border-radius:12px;padding:18px;text-align:center;border:1px solid}
.sc-bull{background:rgba(63,185,80,0.07);border-color:rgba(63,185,80,0.35)}
.sc-base{background:rgba(55,138,221,0.07);border-color:rgba(55,138,221,0.35)}
.sc-bear{background:rgba(248,81,73,0.07);border-color:rgba(248,81,73,0.35)}
.sc-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.bull-c{color:#3fb950}.base-c{color:#378add}.bear-c{color:#f85149}
.sc-price{font-size:28px;font-weight:700;margin-bottom:4px}
.sc-upside{font-size:13px;font-weight:600;margin-bottom:10px}
.sc-prob{font-size:11px;color:#7d8590;margin-bottom:6px}
.prob-track{height:5px;background:#21262d;border-radius:3px;overflow:hidden}
.prob-fill-bull{height:100%;border-radius:3px;background:#3fb950}
.prob-fill-base{height:100%;border-radius:3px;background:#378add}
.prob-fill-bear{height:100%;border-radius:3px;background:#f85149}
.sc-divider{border:none;border-top:1px solid #30363d;margin:10px 0}
.sc-trigger{font-size:11px;color:#7d8590;line-height:1.5;text-align:left}
.sc-trigger strong{color:#e6edf3;font-weight:500}
.target-chart-wrap{position:relative;height:220px;margin-top:8px}
.ai-target-box{background:#161b22;border:1px solid #30363d;border-left:3px solid #378add;border-radius:10px;padding:16px;margin-bottom:18px}
.ai-target-box h3{font-size:13px;font-weight:600;color:#378add;margin-bottom:8px}
.ai-target-box p{font-size:13px;color:#c9d1d9;line-height:1.7}
.key-levels{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.level-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;text-align:center}
.level-lbl{font-size:10px;color:#7d8590;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:5px}
.level-val{font-size:18px;font-weight:600}
.level-sub{font-size:10px;color:#7d8590;margin-top:3px}
.catalyst-list{list-style:none;padding:0}
.catalyst-list li{font-size:12px;color:#c9d1d9;padding:7px 0;border-bottom:1px solid #21262d;display:flex;gap:8px;line-height:1.5}
.catalyst-list li:last-child{border:none}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.time-tabs{display:flex;gap:6px;margin-bottom:14px}
.time-tab{background:#21262d;border:1px solid #30363d;border-radius:6px;padding:4px 12px;font-size:11px;color:#7d8590;cursor:pointer;font-family:inherit}
.time-tab.active{background:#1d9e75;border-color:#1d9e75;color:#fff}
@media(max-width:600px){.grid-2,.scenarios{grid-template-columns:1fr}.bt-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">SA</div>
  <h1>Smart Stock Analyzer</h1>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchPage('analyzer')">Stock Analyzer</button>
    <button class="nav-tab" onclick="switchPage('predictor')">Price Target AI</button>
  </div>
</div>

<div class="container">
  <div class="search-bar">
    <input type="text" id="stockInput" placeholder="Enter NSE stock symbol (e.g. RELIANCE, TCS, INFY)" />
    <button class="btn" id="analyzeBtn" onclick="runAnalysis()">Analyze</button>
  </div>
  <div class="chips">
    <span class="chip" onclick="quickStock('RELIANCE')">RELIANCE</span>
    <span class="chip" onclick="quickStock('TCS')">TCS</span>
    <span class="chip" onclick="quickStock('INFY')">INFY</span>
    <span class="chip" onclick="quickStock('HDFCBANK')">HDFCBANK</span>
    <span class="chip" onclick="quickStock('WIPRO')">WIPRO</span>
    <span class="chip" onclick="quickStock('TATAMOTORS')">TATAMOTORS</span>
    <span class="chip" onclick="quickStock('IOC')">IOC</span>
    <span class="chip" onclick="quickStock('TATAPOWER')">TATAPOWER</span>
  </div>

  <div id="page-analyzer" class="page active"><div id="analyzer-results"></div></div>
  <div id="page-predictor" class="page"><div id="predictor-results"></div></div>

  <div class="disclaimer">⚠️ For educational & simulation purposes only. Not financial advice. Data generated by AI model proxy based on market patterns.</div>
</div>

<script>
// ---------- MOCK DATA ENGINE (Fully client-side, no external API) ----------
let pChart=null,bChart=null,tChart=null,currentSym='',currentData=null,currentTarget=null;

function switchPage(p){
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-tab')[p==='analyzer'?0:1].classList.add('active');
  if(p==='predictor' && currentSym && !currentTarget) runPredictor();
}

function quickStock(s){
  document.getElementById('stockInput').value=s;
  runAnalysis();
}
document.getElementById('stockInput').addEventListener('keydown',e=>{if(e.key==='Enter')runAnalysis()});

function showLoad(containerId, msgs){
  const container = document.getElementById(containerId);
  if(!container) return null;
  container.innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text" id="lmsg">${msgs[0]}</div></div>`;
  let i=0;
  return setInterval(()=>{
    i=(i+1)%msgs.length;
    const el=document.getElementById('lmsg');
    if(el) el.textContent=msgs[i];
  },1500);
}

// generate realistic analysis for any NSE symbol
function generateMockAnalysis(symbol){
  const sym = symbol.toUpperCase();
  // base profiles for popular Indian stocks
  const profiles = {
    RELIANCE: {name:"Reliance Industries Ltd", sector:"Oil & Gas / Retail", basePrice:2850, pe:25.4, roe:14.2, debtEq:0.82, revGrowth:"+11.2%", profitGrowth:"+9.5%", divYield:"0.45%", high52:3120, low52:2360, volume:"12.8M", rsiBase:58, ma50:2750, ma200:2620, trendBias:"Uptrend"},
    TCS: {name:"Tata Consultancy Services", sector:"IT Services", basePrice:4080, pe:28.7, roe:38.5, debtEq:0.09, revGrowth:"+6.8%", profitGrowth:"+5.2%", divYield:"1.75%", high52:4250, low52:3540, volume:"3.2M", rsiBase:52, ma50:4010, ma200:3890, trendBias:"Sideways"},
    INFY: {name:"Infosys Ltd", sector:"IT", basePrice:1520, pe:23.1, roe:30.1, debtEq:0.12, revGrowth:"+7.2%", profitGrowth:"+4.8%", divYield:"1.95%", high52:1675, low52:1350, volume:"5.1M", rsiBase:54, ma50:1490, ma200:1455, trendBias:"Sideways"},
    HDFCBANK: {name:"HDFC Bank Ltd", sector:"Banking", basePrice:1680, pe:19.2, roe:16.4, debtEq:0.35, revGrowth:"+18%", profitGrowth:"+15%", divYield:"0.32%", high52:1790, low52:1380, volume:"8.4M", rsiBase:49, ma50:1650, ma200:1570, trendBias:"Uptrend"},
    WIPRO: {name:"Wipro Ltd", sector:"IT", basePrice:485, pe:21.5, roe:19.2, debtEq:0.15, revGrowth:"+4.2%", profitGrowth:"+3.1%", divYield:"0.85%", high52:545, low52:412, volume:"7.8M", rsiBase:44, ma50:478, ma200:492, trendBias:"Downtrend"},
    TATAMOTORS: {name:"Tata Motors Ltd", sector:"Automotive", basePrice:895, pe:9.7, roe:22.4, debtEq:1.45, revGrowth:"+21%", profitGrowth:"+32%", divYield:"0.22%", high52:1045, low52:648, volume:"14.2M", rsiBase:62, ma50:870, ma200:780, trendBias:"Strong Uptrend"},
    IOC: {name:"Indian Oil Corp", sector:"Oil Marketing", basePrice:148, pe:5.3, roe:18.9, debtEq:1.12, revGrowth:"+8%", profitGrowth:"-2%", divYield:"6.4%", high52:178, low52:119, volume:"9.1M", rsiBase:46, ma50:144, ma200:151, trendBias:"Sideways"},
    TATAPOWER: {name:"Tata Power Co.", sector:"Power", basePrice:415, pe:26.3, roe:15.8, debtEq:2.11, revGrowth:"+12%", profitGrowth:"+14%", divYield:"0.62%", high52:458, low52:268, volume:"11.5M", rsiBase:55, ma50:408, ma200:381, trendBias:"Uptrend"}
  };
  const p = profiles[sym] || {name:`${sym} Ltd`, sector:"Diversified", basePrice:550 + (sym.length*3), pe:18.5, roe:13.2, debtEq:0.9, revGrowth:"+9%", profitGrowth:"+7%", divYield:"0.85%", high52:680, low52:450, volume:"2.3M", rsiBase:50, ma50:545, ma200:530, trendBias:"Sideways"};
  const currentPrice = p.basePrice + (Math.random() * 12 - 6);
  const changePct = ((currentPrice - p.basePrice)/p.basePrice)*100;
  const rsival = Math.min(85, Math.max(15, p.rsiBase + (Math.random() * 10 - 5)));
  const rsiSignal = rsival < 30 ? "Oversold" : (rsival > 70 ? "Overbought" : "Neutral");
  const maSignal = currentPrice > p.ma200 ? (currentPrice > p.ma50 ? "Golden Cross" : "Neutral") : "Death Cross";
  const macd = rsival > 55 ? "Bullish" : (rsival < 45 ? "Bearish" : "Neutral");
  const bollinger = currentPrice > p.ma50*1.04 ? "Upper" : (currentPrice < p.ma50*0.96 ? "Lower" : "Middle");
  const trend = p.trendBias;
  const peVal = p.pe;
  const pb = peVal / 12.5;
  const eps = (currentPrice / peVal).toFixed(2);
  const valuation = peVal < 15 ? "Undervalued" : (peVal > 28 ? "Overvalued" : "Fairly Valued");
  const technicalScore = Math.min(95, Math.max(30, Math.floor(rsival * 0.7 + (trend.includes("Up")?20:trend.includes("Down")?5:12))));
  const fundamentalScore = Math.min(92, Math.floor(45 + (p.roe-10)*2.5 + (p.debtEq<0.5?15:(p.debtEq>1.5?-10:0))));
  const momentumScore = rsival>65?85:(rsival<35?35:65);
  const overallScore = Math.floor((technicalScore+fundamentalScore+momentumScore)/3);
  
  const backtestReturn = ((rsival-30)*0.9 + (trend.includes("Up")?22: trend.includes("Down")?-12:5)).toFixed(1);
  const benchmarkRet = (Number(backtestReturn) - 4 + Math.random()*6).toFixed(1);
  const winRate = Math.min(92, Math.max(42, Math.floor(55 + (rsival-50)*0.6)));
  const maxDrawdown = (Math.abs(12 - (overallScore/10)) + 4).toFixed(1);
  const strategyName = trend.includes("Up") ? "Momentum + Trend" : (trend.includes("Down") ? "Mean Reversion" : "Range Trading");
  const strategyReason = trend.includes("Up") ? `Strategy captures uptrend strength with RSI ${rsival} signalling continuation.` : `Strategy focuses on reversal patterns in ${trend.toLowerCase()} regime.`;
  
  const priceHistory = [];
  let trendSeed = currentPrice - 80;
  for(let i=0;i<12;i++){
    trendSeed += (Math.random() * 18 - 5) + (i>5?2:-1);
    priceHistory.push(Math.max(50,Math.floor(trendSeed + (i===11?0:Math.random()*15))));
  }
  const finalPrice = priceHistory[11];
  
  const analystVerdict = overallScore>=70?"BUY":(overallScore<=40?"SELL":"HOLD");
  const summary = `${p.name} (${sym}) currently trades at ₹${currentPrice.toFixed(2)} with ${changePct>0?"+":""}${changePct.toFixed(2)}%. ${trend} momentum with RSI ${rsival.toFixed(0)} (${rsiSignal.toLowerCase()}). ${valuation} on fundamentals with ROE ${p.roe}% and P/E ${peVal}x. ${analystVerdict==="BUY"?"Positive outlook supported by sector tailwinds.":(analystVerdict==="SELL"?"Cautious stance due to valuation compression.":"Neutral stance, watch key levels.")} Consider stop-loss at ₹${(currentPrice*0.93).toFixed(0)}.`;
  
  return {
    symbol:sym, companyName:p.name, sector:p.sector, currentPrice:currentPrice, change:(changePct*currentPrice/100).toFixed(2), changePct:changePct.toFixed(2), marketCap:`₹${(currentPrice*125).toFixed(0)} Cr`, high52:p.high52, low52:p.low52, volume:p.volume,
    technicals:{rsi:Math.round(rsival), rsiSignal, macd, ma50:p.ma50, ma200:p.ma200, maSignal, bollingerBand:bollinger, trend},
    fundamentals:{pe:peVal, pb:pb.toFixed(2), eps, roe:p.roe, debtToEquity:p.debtEq, revenueGrowth:p.revGrowth, profitGrowth:p.profitGrowth, dividendYield:p.divYield, valuation},
    backtest:{strategy:strategyName, period:"3 Years", totalReturn:Number(backtestReturn), benchmark:Number(benchmarkRet), winRate, maxDrawdown:Number(maxDrawdown), strategyReason},
    healthScore:{technical:technicalScore, fundamental:fundamentalScore, momentum:momentumScore, overall:overallScore},
    priceHistory:priceHistory, priceLabels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
    verdict:analystVerdict, aiSummary:summary
  };
}

function generateMockTarget(symbol, analysis){
  const cp = analysis.currentPrice;
  const sector = analysis.sector;
  const trend = analysis.technicals.trend;
  const roe = analysis.fundamentals.roe;
  const volatility = trend.includes("Up")?0.12:trend.includes("Down")?0.18:0.14;
  const bull3 = cp * (1 + (volatility*0.9 + 0.05));
  const base3 = cp * (1 + (volatility*0.5 + 0.01));
  const bear3 = cp * (1 - (volatility*0.7 - 0.02));
  const bull12 = cp * (1 + (volatility*1.9 + 0.11));
  const base12 = cp * (1 + (volatility*1.2 + 0.05));
  const bear12 = cp * (1 - (volatility*1.0 - 0.04));
  
  const probBull = trend.includes("Up")?38:trend.includes("Down")?22:30;
  const probBase = 50;
  const probBear = 100 - probBull - 35;
  
  const triggersBull = trend.includes("Up")?"Strong earnings beat, margin expansion, capex acceleration":(sector.includes("IT")?"Digital deal wins, TCV growth, stable attrition":"Volume growth, pricing power, regulatory tailwinds");
  const triggersBase = "In-line quarterly results, stable macro, efficient working capital";
  const triggersBear = "Raw material inflation, demand slowdown, margin compression";
  
  const support1 = (cp * 0.93).toFixed(0);
  const support2 = (cp * 0.88).toFixed(0);
  const resistance1 = (cp * 1.08).toFixed(0);
  const resistance2 = (cp * 1.16).toFixed(0);
  const stopLoss = (cp*0.92).toFixed(0);
  const fairValue = (cp * (roe>18?1.12: roe>12?1.05:0.97)).toFixed(0);
  const consensus = (analysis.verdict==="BUY"?"Buy":analysis.verdict==="SELL"?"Hold":"Hold");
  const consensusTarget = (bull12*0.4 + base12*0.4 + bear12*0.2).toFixed(0);
  
  const catalysts = [
    {type:"positive", text:`${sector} sector reforms / government incentives boost outlook`, impact:"High"},
    {type:"positive", text:`ROE ${roe}% indicates efficient capital allocation; Expansion in operating margins likely`, impact:"Medium"},
    {type:"negative", text:"Global interest rate uncertainty may impact FII flows", impact:"Medium"},
    {type:"negative", text:"Intense competition & pricing pressure in core segment", impact:"Low"}
  ];
  const rationale = `${analysis.companyName} is positioned at ₹${cp}. Our 12-month base case of ₹${Math.round(base12)} implies ${(((base12-cp)/cp)*100).toFixed(1)}% upside, supported by ${triggersBase}. Bull case requires ${triggersBull}, while bear risks include ${triggersBear}. Technical structure shows ${trend} with key support at ${support1}. We assign ${probBull}% probability to bull scenario reflecting optimistic industry tailwinds. Investors should watch quarterly revenue growth and debt reduction progress.`;
  
  return {
    symbol, companyName:analysis.companyName, currentPrice:cp, analysisDate:"Apr 2026",
    targets:{threeMonth:{bull:Math.round(bull3), base:Math.round(base3), bear:Math.round(bear3)}, twelveMonth:{bull:Math.round(bull12), base:Math.round(base12), bear:Math.round(bear12)}},
    probabilities:{bull:probBull, base:probBase, bear:probBear},
    scenarios:{
      bull:{price:Math.round(bull12), upside:(((bull12-cp)/cp)*100).toFixed(1), probability:probBull, trigger:triggersBull, timeline:"6-12 months"},
      base:{price:Math.round(base12), upside:(((base12-cp)/cp)*100).toFixed(1), probability:probBase, trigger:triggersBase, timeline:"6-12 months"},
      bear:{price:Math.round(bear12), upside:(((bear12-cp)/cp)*100).toFixed(1), probability:probBear, trigger:triggersBear, timeline:"3-6 months"}
    },
    keyLevels:{support1:Number(support1), support2:Number(support2), resistance1:Number(resistance1), resistance2:Number(resistance2), stopLoss:Number(stopLoss), fairValue:Number(fairValue)},
    catalysts:catalysts,
    analystConsensus:consensus,
    consensusTarget:Number(consensusTarget),
    aiRationale:rationale,
    confidenceScore:Math.min(92, Math.floor(65 + (roe-12)*1.5 + (analysis.healthScore.overall-50)/3)),
    horizon:"12 months"
  };
}

async function runAnalysis(){
  const sym = document.getElementById('stockInput').value.trim().toUpperCase();
  if(!sym) return;
  currentSym = sym; currentData = null; currentTarget = null;
  document.getElementById('analyzeBtn').disabled = true;
  if(document.querySelector('.nav-tab.active')?.innerText.includes('Price Target')) switchPage('analyzer');
  const timer = showLoad('analyzer-results', ['Fetching market quotes...','Computing technical indicators...','Backtesting strategy performance...','AI synthesizing report...']);
  try{
    await new Promise(r => setTimeout(r, 600));
    currentData = generateMockAnalysis(sym);
    clearInterval(timer);
    renderAnalyzer(currentData, sym);
  }catch(e){
    clearInterval(timer);
    document.getElementById('analyzer-results').innerHTML = `<div class="err-box">⚠️ Could not generate data for "${sym}". Try a valid NSE symbol like RELIANCE, TCS, INFY.</div>`;
  }
  document.getElementById('analyzeBtn').disabled = false;
}

async function runPredictor(){
  if(!currentSym || !currentData){
    document.getElementById('predictor-results').innerHTML = `<div class="err-box">📊 Please analyze a stock first using the Stock Analyzer tab.</div>`;
    return;
  }
  const timer = showLoad('predictor-results', ['Forecasting price scenarios...','Analyzing risk/reward...','Building bull/base/bear cases...','Finalizing AI targets...']);
  await new Promise(r => setTimeout(r, 550));
  currentTarget = generateMockTarget(currentSym, currentData);
  clearInterval(timer);
  renderPredictor(currentTarget, currentSym, currentData);
}

// rendering functions (identical to original but safe)
function pBar(v,max=100,color='#1d9e75'){return`<div class="prog-bar"><div class="prog-fill" style="width:${Math.min(100,(v/max)*100).toFixed(0)}%;background:${color}"></div></div>`;}
function getVClass(v){return v==='BUY'?'verdict-buy':v==='SELL'?'verdict-sell':'verdict-hold';}
function scColor(s){return s==='bull'?'#3fb950':s==='base'?'#378add':'#f85149';}

function renderAnalyzer(d,sym){
  const tc=d.technicals, fn=d.fundamentals, bt=d.backtest, hs=d.healthScore;
  const chgC=d.changePct>=0?'up':'down', chgS=d.changePct>=0?'+':'';
  document.getElementById('analyzer-results').innerHTML = `
  <div class="metrics-grid">
    <div class="metric-card"><div class="metric-label">Price</div><div class="metric-value">₹${d.currentPrice.toLocaleString('en-IN',{maximumFractionDigits:2})}</div><div class="metric-sub ${chgC}">${chgS}${d.change} (${chgS}${d.changePct}%)</div></div>
    <div class="metric-card"><div class="metric-label">Market Cap</div><div class="metric-value" style="font-size:15px">${d.marketCap}</div><div class="metric-sub neutral">${d.sector}</div></div>
    <div class="metric-card"><div class="metric-label">52W High</div><div class="metric-value up">₹${d.high52.toLocaleString('en-IN')}</div></div>
    <div class="metric-card"><div class="metric-label">52W Low</div><div class="metric-value down">₹${d.low52.toLocaleString('en-IN')}</div></div>
    <div class="metric-card"><div class="metric-label">Volume</div><div class="metric-value" style="font-size:15px">${d.volume}</div></div>
  </div>
  <div style="margin-bottom:16px"><div class="card"><div style="font-size:11px;color:#7d8590;margin-bottom:6px">12-month price trend</div><div class="chart-wrap"><canvas id="pChart" role="img"></canvas></div></div></div>
  <div class="grid-2">
    <div class="card"><h3>Technicals <span class="badge ${tc.trend.includes('Up')?'badge-buy':tc.trend.includes('Down')?'badge-sell':'badge-hold'}">${tc.trend}</span></h3>
      <div class="ind-row"><span class="ind-name">RSI (14)</span><span class="ind-val ${tc.rsi<30?'up':tc.rsi>70?'down':'neutral'}">${tc.rsi} — ${tc.rsiSignal}</span></div>
      <div class="ind-row"><span class="ind-name">MACD</span><span class="ind-val ${tc.macd==='Bullish'?'up':'down'}">${tc.macd}</span></div>
      <div class="ind-row"><span class="ind-name">MA 50</span><span class="ind-val">₹${tc.ma50.toLocaleString('en-IN')}</span></div>
      <div class="ind-row"><span class="ind-name">MA 200</span><span class="ind-val">₹${tc.ma200.toLocaleString('en-IN')}</span></div>
      <div class="ind-row"><span class="ind-name">MA Signal</span><span class="ind-val ${tc.maSignal?.includes('Golden')?'up':tc.maSignal?.includes('Death')?'down':'neutral'}">${tc.maSignal}</span></div>
      <div class="ind-row"><span class="ind-name">Bollinger</span><span class="ind-val">${tc.bollingerBand}</span></div>
      <div style="margin-top:10px"><div style="font-size:10px;color:#7d8590;margin-bottom:3px">Technical score</div>${pBar(hs.technical)}<span style="font-size:12px;font-weight:600;color:#1d9e75">${hs.technical}/100</span></div>
    </div>
    <div class="card"><h3>Fundamentals <span class="badge ${fn.valuation==='Undervalued'?'badge-buy':fn.valuation==='Overvalued'?'badge-sell':'badge-hold'}">${fn.valuation}</span></h3>
      <div class="ind-row"><span class="ind-name">P/E</span><span class="ind-val">${fn.pe}x</span></div><div class="ind-row"><span class="ind-name">P/B</span><span class="ind-val">${fn.pb}x</span></div>
      <div class="ind-row"><span class="ind-name">EPS</span><span class="ind-val">₹${fn.eps}</span></div><div class="ind-row"><span class="ind-name">ROE</span><span class="ind-val ${fn.roe>15?'up':fn.roe<8?'down':'neutral'}">${fn.roe}%</span></div>
      <div class="ind-row"><span class="ind-name">Debt/Equity</span><span class="ind-val ${fn.debtToEquity<0.5?'up':fn.debtToEquity>2?'down':'neutral'}">${fn.debtToEquity}</span></div>
      <div class="ind-row"><span class="ind-name">Revenue Growth</span><span class="ind-val up">${fn.revenueGrowth}</span></div>
      <div class="ind-row"><span class="ind-name">Profit Growth</span><span class="ind-val up">${fn.profitGrowth}</span></div>
      <div class="ind-row"><span class="ind-name">Dividend Yield</span><span class="ind-val">${fn.dividendYield}</span></div>
      <div style="margin-top:10px"><div style="font-size:10px;color:#7d8590;margin-bottom:3px">Fundamental score</div>${pBar(hs.fundamental)}<span style="font-size:12px;font-weight:600;color:#1d9e75">${hs.fundamental}/100</span></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:16px"><h3>Backtest — "${bt.strategy}"</h3><div style="font-size:11px;color:#7d8590;margin-bottom:12px">${bt.strategyReason}</div>
    <div class="bt-grid"><div class="bt-card"><div class="bt-val ${bt.totalReturn>=0?'up':'down'}">${bt.totalReturn>=0?'+':''}${bt.totalReturn}%</div><div class="bt-lbl">Return (${bt.period})</div></div>
    <div class="bt-card"><div class="bt-val neutral">${bt.benchmark}%</div><div class="bt-lbl">Nifty50</div></div>
    <div class="bt-card"><div class="bt-val up">${bt.winRate}%</div><div class="bt-lbl">Win Rate</div></div>
    <div class="bt-card"><div class="bt-val down">-${Math.abs(bt.maxDrawdown)}%</div><div class="bt-lbl">Max Drawdown</div></div></div>
    <div class="chart-wrap" style="height:140px"><canvas id="bChart" role="img"></canvas></div>
  </div>
  <div class="ai-box"><h3>AI Investment Analysis</h3><p>${d.aiSummary}</p><div style="margin-top:12px"><span style="font-size:12px;color:#7d8590;margin-right:8px">Verdict:</span><span class="verdict ${getVClass(d.verdict)}">${d.verdict}</span>
  <button onclick="switchPage('predictor');if(!currentTarget)runPredictor();" style="margin-left:12px;background:#21262d;border:1px solid #30363d;border-radius:6px;padding:5px 14px;font-size:12px;color:#378add;cursor:pointer">View Price Targets →</button></div></div>`;
  
  if(pChart)pChart.destroy(); const pc=document.getElementById('pChart');
  if(pc) pChart=new Chart(pc,{type:'line',data:{labels:d.priceLabels,datasets:[{label:sym,data:d.priceHistory,borderColor:'#1d9e75',backgroundColor:'rgba(29,158,117,0.08)',borderWidth:2,fill:true,tension:0.4,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#21262d'},ticks:{color:'#7d8590'}},y:{grid:{color:'#21262d'},ticks:{callback:v=>'₹'+v.toLocaleString('en-IN')}}}}});
  if(bChart)bChart.destroy(); const bc=document.getElementById('bChart');
  if(bc){const sr=[bt.totalReturn*0.3,bt.totalReturn*0.65,bt.totalReturn],bnr=[bt.benchmark*0.3,bt.benchmark*0.65,bt.benchmark];
  bChart=new Chart(bc,{type:'line',data:{labels:['Yr 1','Yr 2','Yr 3'],datasets:[{label:'Strategy',data:sr,borderColor:'#1d9e75',borderWidth:2},{label:'Nifty50',data:bnr,borderColor:'#378add',borderDash:[5,5],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7d8590'}}},scales:{x:{grid:{color:'#21262d'}},y:{grid:{color:'#21262d'},ticks:{callback:v=>v+'%'}}}}})}
}

function renderPredictor(d,sym,base){
  const cp=d.currentPrice, sc=d.scenarios, kl=d.keyLevels;
  function scenarioCard(type,label,price,cp,prob,trigger,timeline){ const pv=Number(price)||0; const upside=(((pv-cp)/cp)*100).toFixed(1); const uColor=parseFloat(upside)>=0?'#3fb950':'#f85149'; return `<div class="scenario-card sc-${type}"><div class="sc-label ${type}-c">${label}</div><div class="sc-price ${type}-c">₹${pv.toLocaleString('en-IN')}</div><div class="sc-upside" style="color:${uColor}">${parseFloat(upside)>=0?'+':''}${upside}%</div><div class="sc-prob">Probability: ${prob}%</div><div class="prob-track"><div class="prob-fill-${type}" style="width:${prob}%"></div></div><hr class="sc-divider"><div class="sc-trigger"><strong>Key triggers:</strong><br>${trigger||'—'}</div><div style="font-size:10px;color:#7d8590;margin-top:6px">Timeline: ${timeline}</div></div>`;}
  document.getElementById('predictor-results').innerHTML = `
  <div class="pt-hero"><div class="pt-current">Current Price</div><div class="pt-price">₹${cp.toLocaleString('en-IN')}</div><div style="display:flex;justify-content:center;gap:10px;margin-top:4px"><span class="pt-horizon">AI Consensus: <strong style="color:#378add">${d.analystConsensus}</strong></span><span>|</span><span class="pt-horizon">Consensus Target: <strong>₹${d.consensusTarget.toLocaleString('en-IN')}</strong></span><span>|</span><span class="pt-horizon">Confidence: <strong>${d.confidenceScore}/100</strong></span></div></div>
  <div class="time-tabs"><button class="time-tab active" id="tab3m" onclick="showHorizon('3m')">3-Month Targets</button><button class="time-tab" id="tab12m" onclick="showHorizon('12m')">12-Month Targets</button></div>
  <div id="horizon-3m"><div class="scenarios">${scenarioCard('bull','Bull Case',d.targets.threeMonth.bull,cp,d.probabilities.bull,sc.bull.trigger,'3 months')}${scenarioCard('base','Base Case',d.targets.threeMonth.base,cp,d.probabilities.base,sc.base.trigger,'3-6 months')}${scenarioCard('bear','Bear Case',d.targets.threeMonth.bear,cp,d.probabilities.bear,sc.bear.trigger,'3 months')}</div></div>
  <div id="horizon-12m" style="display:none"><div class="scenarios">${scenarioCard('bull','Bull Case',d.targets.twelveMonth.bull,cp,d.probabilities.bull,sc.bull.trigger,'12 months')}${scenarioCard('base','Base Case',d.targets.twelveMonth.base,cp,d.probabilities.base,sc.base.trigger,'12 months')}${scenarioCard('bear','Bear Case',d.targets.twelveMonth.bear,cp,d.probabilities.bear,sc.bear.trigger,'12 months')}</div></div>
  <div class="card" style="margin-bottom:16px"><h3>Price Target Chart — Bull / Base / Bear</h3><div class="target-chart-wrap"><canvas id="tChart"></canvas></div></div>
  <div><div style="font-size:10px;color:#7d8590;margin-bottom:8px">Key Price Levels</div><div class="key-levels">${Object.entries(kl).map(([k,v])=>`<div class="level-card"><div class="level-lbl">${k.replace(/([A-Z])/g,' $1').replace(/^./,str=>str.toUpperCase())}</div><div class="level-val ${k.includes('support')||k.includes('stop')?'down':'up'}">₹${v.toLocaleString('en-IN')}</div><div class="level-sub">${k.includes('stop')?'SL level':(k.includes('fair')?'DCF value':'key zone')}</div></div>`).join('')}</div></div>
  <div class="grid-2"><div class="card"><h3>Upside Catalysts</h3><ul class="catalyst-list">${d.catalysts.filter(c=>c.type==='positive').map(c=>`<li><span class="cat-dot" style="background:#3fb950"></span><span><strong>[${c.impact}]</strong> ${c.text}</span></li>`).join('')}</ul></div>
  <div class="card"><h3>Key Risks</h3><ul class="catalyst-list">${d.catalysts.filter(c=>c.type==='negative').map(c=>`<li><span class="cat-dot" style="background:#f85149"></span><span><strong>[${c.impact}]</strong> ${c.text}</span></li>`).join('')}</ul></div></div>
  <div class="ai-target-box"><h3>AI Target Rationale</h3><p>${d.aiRationale}</p></div>`;
  showTargetChart(d,cp);
}
function showHorizon(h){ document.getElementById('horizon-3m').style.display=h==='3m'?'block':'none'; document.getElementById('horizon-12m').style.display=h==='12m'?'block':'none'; document.getElementById('tab3m').className='time-tab'+(h==='3m'?' active':''); document.getElementById('tab12m').className='time-tab'+(h==='12m'?' active':'');}
function showTargetChart(d,cp){ if(tChart)tChart.destroy(); const tc=document.getElementById('tChart'); if(!tc)return; const t3=d.targets.threeMonth, t12=d.targets.twelveMonth; tChart=new Chart(tc,{type:'line',data:{labels:['Now','3 Months','6 Months','12 Months'],datasets:[{label:'Bull Case',data:[cp,t3.bull,(t3.bull+t12.bull)/2,t12.bull],borderColor:'#3fb950',borderWidth:2,pointRadius:5},{label:'Base Case',data:[cp,t3.base,(t3.base+t12.base)/2,t12.base],borderColor:'#378add',borderWidth:2,pointRadius:5},{label:'Bear Case',data:[cp,t3.bear,(t3.bear+t12.bear)/2,t12.bear],borderColor:'#f85149',borderWidth:2,borderDash:[5,5],pointRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7d8590'}}},scales:{x:{grid:{color:'#21262d'}},y:{grid:{color:'#21262d'},ticks:{callback:v=>'₹'+v.toLocaleString('en-IN')}}}}})}
</script>
